<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>avito-bot</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260624-manual-visual" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>avito-bot</h1>
          <p id="connectionLine">Checking environment...</p>
        </div>
        <div class="toolbar">
          <button id="refreshStatusButton" type="button">Status</button>
          <button id="tokenButton" type="button">Token</button>
          <button id="accountButton" type="button">Account</button>
          <button id="chatsButton" type="button">Chats</button>
          <button id="processUnreadButton" type="button">Process unread</button>
          <label class="inline-toggle">
            <input id="autoProcessInput" type="checkbox" checked />
            <span>Auto reply</span>
          </label>
          <button id="aiPingButton" type="button">DeepSeek</button>
        </div>
        <p id="automationLine" class="automation-line">Auto reply idle</p>
      </header>

      <nav class="view-tabs" aria-label="Основные разделы">
        <button id="chatTabButton" class="view-tab active" type="button">Чаты</button>
        <button id="statsTabButton" class="view-tab" type="button">Статистика</button>
      </nav>

      <section id="chatView" class="workspace">
        <aside class="panel chats-panel">
          <div class="panel-header">
            <h2>Chats</h2>
            <label class="inline-toggle">
              <input id="unreadOnlyInput" type="checkbox" />
              <span>Unread</span>
            </label>
          </div>
          <div id="chatList" class="chat-list"></div>
        </aside>

        <section class="panel conversation-panel">
          <div class="panel-header">
            <div class="conversation-heading">
              <h2 id="conversationTitle">Conversation</h2>
              <a id="clientProfileLink" class="client-profile-link" href="#" target="_blank" rel="noreferrer" hidden>
                Профиль клиента на Avito
              </a>
            </div>
            <div class="panel-actions">
              <button id="managerTakeoverButton" class="chat-control-toggle" type="button" disabled aria-pressed="false">
                Включить ручной режим
              </button>
              <button id="draftButton" type="button" disabled hidden>AI draft</button>
              <button id="readButton" type="button" disabled hidden>Read</button>
            </div>
          </div>
          <div id="botActivity" class="bot-activity">Бот ждёт входящих сообщений</div>
          <div id="messageList" class="message-list"></div>
          <section id="draftPanel" class="draft-panel" hidden>
            <div class="draft-header">
              <strong>AI draft</strong>
              <button id="useDraftButton" type="button">Use draft</button>
            </div>
            <div id="draftText" class="draft-text"></div>
          </section>
          <form id="sendForm" class="send-form">
            <input id="messageInput" type="text" placeholder="Message to Avito" disabled />
            <button id="sendButton" type="submit" disabled>Send</button>
          </form>
        </section>

        <aside class="panel inspector-panel">
          <div class="panel-header">
            <h2>API response</h2>
            <button id="webhooksButton" type="button">Webhook</button>
          </div>
          <pre id="output">{}</pre>
        </aside>
      </section>

      <section id="statsView" class="workspace stats-workspace" hidden>
        <aside class="panel stats-controls-panel">
          <div class="panel-header">
            <h2>Объявления</h2>
            <button id="refreshStatsItemsButton" type="button">Обновить</button>
          </div>
          <div class="stats-controls">
            <div class="field-row">
              <label for="statsDateFrom">С даты</label>
              <input id="statsDateFrom" type="date" />
            </div>
            <div class="field-row">
              <label for="statsDateTo">По дату</label>
              <input id="statsDateTo" type="date" />
            </div>
            <div class="field-row">
              <label for="statsItemIdsInput">ID вручную</label>
              <input id="statsItemIdsInput" type="text" placeholder="123, 456" />
            </div>
            <div class="stats-field-group" aria-label="Метрики">
              <label class="inline-toggle">
                <input id="statsViewsInput" type="checkbox" checked />
                <span>Просмотры</span>
              </label>
              <label class="inline-toggle">
                <input id="statsContactsInput" type="checkbox" checked />
                <span>Контакты</span>
              </label>
              <label class="inline-toggle">
                <input id="statsFavoritesInput" type="checkbox" checked />
                <span>Избранное</span>
              </label>
            </div>
            <button id="loadStatsButton" type="button">Загрузить статистику</button>
          </div>
          <div id="statsItemList" class="stats-item-list"></div>
        </aside>

        <section class="panel stats-results-panel">
          <div class="panel-header">
            <h2>Просмотры по дням</h2>
            <p id="statsStatusLine" class="panel-status">Выберите объявления</p>
          </div>
          <div id="statsSummary" class="stats-summary"></div>
          <div class="stats-table-wrap">
            <table class="stats-table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Объявление</th>
                  <th>Просмотры</th>
                  <th>Контакты</th>
                  <th>Избранное</th>
                </tr>
              </thead>
              <tbody id="statsTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/bot-rules.js"></script>
    <script src="/static/app.js?v=20260624-loading-race"></script>
  </body>
</html>
