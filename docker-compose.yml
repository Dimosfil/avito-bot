services:
  avito-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:${PORT:-${API_PORT:-8000}}"
    volumes:
      - ./.codex-runtime:/app/.codex-runtime
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, os, urllib.request; port=os.getenv('PORT') or os.getenv('API_PORT') or '8000'; r=urllib.request.urlopen(f'http://127.0.0.1:{port}/api/health', timeout=3); raise SystemExit(0 if json.load(r).get('status') == 'ok' else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
